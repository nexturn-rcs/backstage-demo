apiVersion: scaffolder.backstage.io/v1beta3
kind: Template
metadata:
  name: create-file
  title: Create a File
  description: A template that creates a file using a custom action
spec:
  owner: backstage-team
  type: service
  steps:
    - id: create-file-step
      name: Create a New File
      action: acme:file:create
      input:
        filename: "hello.txt"
        contents: "Hello, Kaushik! This is a file created by Backstage."
  output:
    fileMessage: "File hello.txt has been created successfully!"
