apiVersion: scaffolder.backstage.io/v1beta3
kind: Template
metadata:
  name: python-github-repo-template
  title: Python GitHub Repo Template
  description: Creates a GitHub repo with a Python project
spec:
  owner: your-team
  type: service

  parameters:
    - title: Repository Info
      required:
        - repoName
        - owner
      properties:
        repoName:
          type: string
          title: Repository Name
        owner:
          type: string
          title: GitHub Owner
          description: GitHub user or organization
        description:
          type: string
          title: Repository Description
          default: A Python project generated by Backstage

  steps:
    - id: create-repo
      name: Create GitHub Repository
      action: publish:github
      input:
        repoUrl: github.com/${{ parameters.owner }}/${{ parameters.repoName }}
        description: ${{ parameters.description }}
        defaultBranch: main
        protectDefaultBranch: false
        private: true

    - id: template
      name: Generate Python Project
      action: fetch:template
      input:
        url: ./skeleton
        values:
          name: ${{ parameters.repoName }}

    - id: push
      name: Push Code to GitHub
      action: publish:github
      input:
        repoUrl: github.com/${{ parameters.owner }}/${{ parameters.repoName }}
        branchName: main
        commitMessage: "Initial commit with Python project"

  output:
    links:
      - title: GitHub Repository
        url: https://github.com/${{ parameters.owner }}/${{ parameters.repoName }}

